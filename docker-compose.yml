services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartpdf
      POSTGRES_USER: smartpdf
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartpdf_secret}
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartpdf"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://smartpdf:${POSTGRES_PASSWORD:-smartpdf_secret}@db:5432/smartpdf
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin@123456}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@smartpdfreader.com}
    volumes:
      - pdf_uploads:/app/uploads
    restart: unless-stopped

volumes:
  pdf_uploads:
  db_data:
